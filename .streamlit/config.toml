# CHEM 120 Catalyst Insight Studio — dark "lab glass" theme.
# Base colors live here; the glass cards, gradients, and animations are added
# by inject_css() in app.py.

[theme]
base = "dark"
primaryColor = "#38bdf8"
backgroundColor = "#0a0f1c"
secondaryBackgroundColor = "#111a2e"
textColor = "#e2e8f0"
font = "sans serif"

[browser]
gatherUsageStats = false
